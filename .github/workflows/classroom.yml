    container:
      image: mcr.microsoft.com/playwright/python:v1.58.0-jammy
      options: --user root
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r requirements.txt pytest pytest-html pytest-timeout pytest-json-report
      - name: Запуск
        id: test
        run: |
          mkdir -p output/screenshots output/reports tools/output
          pytest tests/test_inventory.py -v --tb=short --timeout=60 \
            --html=output/reports/inventory_report.html --self-contained-html \
            --json-report --json-report-file=tools/output/inventory_results.json \
            2>&1 | tee tools/output/inventory_output.txt || true
          passed=$(python -c "import json; print(json.load(open('tools/output/inventory_results.json')).get('summary',{}).get('passed',0))" 2>/dev/null) || passed=0
          score=$((passed * 2))
          [ $score -gt 10 ] && score=10
          echo "score=$score" >> $GITHUB_OUTPUT
          echo "$score" > tools/output/inventory_score.txt
      - name: Summary
        run: python tools/write_summary_inventory.py >> $GITHUB_STEP_SUMMARY 2>/dev/null || true

  # ─────────────────────────────────────────────────────────────
  # JOB 8: Тесты UI (10 баллов, бонус)
  # ─────────────────────────────────────────────────────────────
  test-ui:
    name: "🎨 UI (10 бонус)"
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    needs: check-structure
    continue-on-error: true
    outputs:
      score: ${{ steps.test.outputs.score }}
    container:
      image: mcr.microsoft.com/playwright/python:v1.58.0-jammy
      options: --user root
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r requirements.txt pytest pytest-html pytest-timeout pytest-json-report
      - name: Запуск
        id: test
        run: |
          mkdir -p output/screenshots output/reports tools/output
          pytest tests/test_ui.py -v --tb=short --timeout=60 \
            --html=output/reports/ui_report.html --self-contained-html \
            --json-report --json-report-file=tools/output/ui_results.json \
            2>&1 | tee tools/output/ui_output.txt || true
          passed=$(python -c "import json; print(json.load(open('tools/output/ui_results.json')).get('summary',{}).get('passed',0))" 2>/dev/null) || passed=0
          score=$((passed * 2))
          [ $score -gt 10 ] && score=10
          echo "score=$score" >> $GITHUB_OUTPUT
          echo "$score" > tools/output/ui_score.txt
      - name: Summary
        run: python tools/write_summary_ui.py >> $GITHUB_STEP_SUMMARY 2>/dev/null || true

  # ─────────────────────────────────────────────────────────────
  # JOB 9: Тесты производительности (10 баллов, бонус)
  # ─────────────────────────────────────────────────────────────
  test-performance:
    name: "⚡ Performance (10 бонус)"
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    needs: check-structure
    continue-on-error: true
    outputs:
      score: ${{ steps.test.outputs.score }}
    container:
      image: mcr.microsoft.com/playwright/python:v1.58.0-jammy
      options: --user root
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r requirements.txt pytest pytest-html pytest-timeout pytest-json-report
      - name: Запуск
        id: test
        run: |
          mkdir -p output/screenshots output/reports tools/output
          pytest tests/test_performance.py -v --tb=short --timeout=120 \
            --html=output/reports/performance_report.html --self-contained-html \
            --json-report --json-report-file=tools/output/performance_results.json \
            2>&1 | tee tools/output/performance_output.txt || true
          passed=$(python -c "import json; print(json.load(open('tools/output/performance_results.json')).get('summary',{}).get('passed',0))" 2>/dev/null) || passed=0
          score=$((passed * 4))
          [ $score -gt 10 ] && score=10
          echo "score=$score" >> $GITHUB_OUTPUT
          echo "$score" > tools/output/performance_score.txt
      - name: Summary
        run: python tools/write_summary_performance.py >> $GITHUB_STEP_SUMMARY 2>/dev/null || true

  # ─────────────────────────────────────────────────────────────
  # JOB 10: Кросс-браузер тесты (10 баллов, бонус)
  # ─────────────────────────────────────────────────────────────
  test-cross-browser:
    name: "🌐 Cross-Browser (10 бонус)"
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    needs: check-structure
    continue-on-error: true
    outputs:
      score: ${{ steps.test.outputs.score }}
    container:
      image: mcr.microsoft.com/playwright/python:v1.58.0-jammy
      options: --user root
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r requirements.txt pytest pytest-html pytest-timeout pytest-json-report
      - name: Запуск
        id: test
        run: |
          mkdir -p output/screenshots output/reports tools/output
          pytest tests/test_cross_browser.py -v --tb=short --timeout=60 \
            --html=output/reports/cross_browser_report.html --self-contained-html \
            --json-report --json-report-file=tools/output/cross_browser_results.json \
            2>&1 | tee tools/output/cross_browser_output.txt || true
          passed=$(python -c "import json; print(json.load(open('tools/output/cross_browser_results.json')).get('summary',{}).get('passed',0))" 2>/dev/null) || passed=0
          score=$((passed * 4))
          [ $score -gt 10 ] && score=10
          echo "score=$score" >> $GITHUB_OUTPUT
          echo "$score" > tools/output/cross_browser_score.txt
      - name: Summary
        run: python tools/write_summary_cross_browser.py >> $GITHUB_STEP_SUMMARY 2>/dev/null || true

  # ─────────────────────────────────────────────────────────────
  # JOB 11: Page Object Pattern (10 баллов)
  # ─────────────────────────────────────────────────────────────
  check-pom:
    name: "🏗️ POM (10 баллов)"
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    needs: check-structure
    outputs:
      score: ${{ steps.check.outputs.score }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Проверка
        id: check
        run: |
          mkdir -p tools/output
          python tools/check_pom.py > tools/output/pom_result.txt 2>&1
          if grep -q "PASS" tools/output/pom_result.txt; then
            echo "score=10" >> $GITHUB_OUTPUT
            echo "10" > tools/output/pom_score.txt
          else
            echo "score=0" >> $GITHUB_OUTPUT
            echo "0" > tools/output/pom_score.txt
          fi
      - name: Summary
        run: python tools/write_summary_pom.py >> $GITHUB_STEP_SUMMARY 2>/dev/null || true

  # ─────────────────────────────────────────────────────────────
  # JOB 12: Итоговый Summary
  # ─────────────────────────────────────────────────────────────
  final-summary:
    name: "📊 Итоговый отчёт"
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    needs: [check-structure, lint-code, test-auth, test-cart, test-e2e, test-checkout, test-inventory, test-ui, test-performance, test-cross-browser, check-pom]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Генерация
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python tools/generate_final_summary.py >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "**ИТОГО: Ошибка генерации отчёта**" >> $GITHUB_STEP_SUMMARY
      - name: Upload всех артефактов
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: all-artifacts-${{ github.run_number }}-${{ github.sha }}
          path: |
            tools/output/
            output/
          retention-days: 14