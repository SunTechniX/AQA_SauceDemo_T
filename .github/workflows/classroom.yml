# .github/workflows/classroom.yml
# GitHub Classroom Autograder — ПОЛНАЯ ВЕРСИЯ (Март 2026)
# Все категории: auth, cart, e2e, checkout, inventory, ui, performance, cross_browser

name: 🎓 GitHub Classroom Autograder

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  PYTHON_VERSION: '3.12'
  PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
  PIP_TRUSTED_HOST: pypi.tuna.tsinghua.edu.cn

# ─────────────────────────────────────────────────────────────
# JOB 1: Структура проекта (10 баллов)
# ─────────────────────────────────────────────────────────────
jobs:
  check-structure:
    name: "📁 Структура (10 баллов)"
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    outputs:
      score: ${{ steps.check.outputs.score }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Проверка
        id: check
        run: |
          mkdir -p tools/output
          python tools/check_structure.py > tools/output/structure_result.txt 2>&1
          if grep -q "PASS" tools/output/structure_result.txt; then
            echo "score=10" >> $GITHUB_OUTPUT
            echo "10" > tools/output/structure_score.txt
          else
            echo "score=0" >> $GITHUB_OUTPUT
            echo "0" > tools/output/structure_score.txt
          fi
      - name: Summary
        run: python tools/write_summary_structure.py >> $GITHUB_STEP_SUMMARY 2>/dev/null || true

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Линтинг (15 баллов)
  # ─────────────────────────────────────────────────────────────
  lint-code:
    name: "🧹 Линтинг (15 баллов)"
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    needs: check-structure
    continue-on-error: true
    outputs:
      score: ${{ steps.lint.outputs.score }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install flake8
      - name: Запуск
        id: lint
        run: |
          mkdir -p tools/output
          python -m flake8 . --config=tools/flake8_config.cfg > tools/output/flake8_report.txt 2>&1 || true
          error_count=$(grep -c ":" tools/output/flake8_report.txt 2>/dev/null || echo "0")
          score=$((15 - error_count))
          [ $score -lt 0 ] && score=0
          echo "score=$score" >> $GITHUB_OUTPUT
          echo "$score" > tools/output/lint_score.txt
      - name: Summary
        run: python tools/write_summary_lint.py >> $GITHUB_STEP_SUMMARY 2>/dev/null || true

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Тесты авторизации (25 баллов)
  # ─────────────────────────────────────────────────────────────
  test-auth:
    name: "🔐 Auth (25 баллов)"
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    needs: check-structure
    continue-on-error: true
    outputs:
      score: ${{ steps.test.outputs.score }}
    container:
      image: mcr.microsoft.com/playwright/python:v1.58.0-jammy
      options: --user root
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r requirements.txt pytest pytest-html pytest-timeout pytest-json-report
      - name: Запуск
        id: test
        run: |
          mkdir -p output/screenshots output/reports tools/output
          pytest tests/test_auth.py -v --tb=short --timeout=60 \
            --html=output/reports/auth_report.html --self-contained-html \
            --json-report --json-report-file=tools/output/auth_results.json \
            2>&1 | tee tools/output/auth_output.txt || true
          passed=$(python -c "import json; print(json.load(open('tools/output/auth_results.json')).get('summary',{}).get('passed',0))" 2>/dev/null) || passed=0
          score=$((passed * 4))
          [ $score -gt 25 ] && score=25
          echo "score=$score" >> $GITHUB_OUTPUT
          echo "$score" > tools/output/auth_score.txt
          echo "$passed" > tools/output/auth_passed.txt
      - name: Summary
        run: python tools/write_summary_auth.py >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth-artifacts-${{ github.run_number }}
          path: |
            output/
            tools/output/auth_results.json
            tools/output/auth_output.txt
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # JOB 4: Тесты корзины (25 баллов)
  # ─────────────────────────────────────────────────────────────
  test-cart:
    name: "🛒 Cart (25 баллов)"
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    needs: check-structure
    continue-on-error: true
    outputs:
      score: ${{ steps.test.outputs.score }}
    container:
      image: mcr.microsoft.com/playwright/python:v1.58.0-jammy
      options: --user root
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r requirements.txt pytest pytest-html pytest-timeout pytest-json-report
      - name: Запуск
        id: test
        run: |
          mkdir -p output/screenshots output/reports tools/output
          pytest tests/test_cart.py -v --tb=short --timeout=60 \
            --html=output/reports/cart_report.html --self-contained-html \
            --json-report --json-report-file=tools/output/cart_results.json \
            2>&1 | tee tools/output/cart_output.txt || true
          passed=$(python -c "import json; print(json.load(open('tools/output/cart_results.json')).get('summary',{}).get('passed',0))" 2>/dev/null) || passed=0
          score=$((passed * 5))
          [ $score -gt 25 ] && score=25
          echo "score=$score" >> $GITHUB_OUTPUT
          echo "$score" > tools/output/cart_score.txt
          echo "$passed" > tools/output/cart_passed.txt
      - name: Summary
        run: python tools/write_summary_cart.py >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cart-artifacts-${{ github.run_number }}
          path: |
            output/
            tools/output/cart_results.json
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # JOB 5: E2E тест (25 баллов)
  # ─────────────────────────────────────────────────────────────
  test-e2e:
    name: "💳 E2E (25 баллов)"
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    needs: [check-structure, test-auth, test-cart]
    continue-on-error: true
    outputs:
      score: ${{ steps.test.outputs.score }}
      passed: ${{ steps.test.outputs.passed }}
    container:
      image: mcr.microsoft.com/playwright/python:v1.58.0-jammy
      options: --user root
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r requirements.txt pytest pytest-html pytest-timeout
      - name: Запуск
        id: test
        run: |
          mkdir -p output/screenshots output/reports tools/output
          pytest tests/test_e2e.py -v --tb=short --timeout=120 \
            --html=output/reports/e2e_report.html --self-contained-html \
            --json-report --json-report-file=tools/output/e2e_results.json \
            2>&1 | tee tools/output/e2e_output.txt || true
          if grep -q "1 passed" tools/output/e2e_output.txt 2>/dev/null; then
            score=25
            passed=true
          else
            score=0
            passed=false
          fi
          echo "score=$score" >> $GITHUB_OUTPUT
          echo "passed=$passed" >> $GITHUB_OUTPUT
          echo "$score" > tools/output/e2e_score.txt
      - name: Summary
        run: python tools/write_summary_e2e.py >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts-${{ github.run_number }}
          path: |
            output/
            tools/output/e2e_output.txt
            tools/output/e2e_results.json
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # JOB 6: Тесты чекаута (15 баллов, бонус)
  # ─────────────────────────────────────────────────────────────
  test-checkout:
    name: "📋 Checkout (15 бонус)"
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    needs: check-structure
    continue-on-error: true
    outputs:
      score: ${{ steps.test.outputs.score }}
    container:
      image: mcr.microsoft.com/playwright/python:v1.58.0-jammy
      options: --user root
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r requirements.txt pytest pytest-html pytest-timeout pytest-json-report
      - name: Запуск
        id: test
        run: |
          mkdir -p output/screenshots output/reports tools/output
          pytest tests/test_checkout.py -v --tb=short --timeout=60 \
            --html=output/reports/checkout_report.html --self-contained-html \
            --json-report --json-report-file=tools/output/checkout_results.json \
            2>&1 | tee tools/output/checkout_output.txt || true
          passed=$(python -c "import json; print(json.load(open('tools/output/checkout_results.json')).get('summary',{}).get('passed',0))" 2>/dev/null) || passed=0
          score=$((passed * 7))
          [ $score -gt 15 ] && score=15
          echo "score=$score" >> $GITHUB_OUTPUT
          echo "$score" > tools/output/checkout_score.txt
      - name: Summary
        run: python tools/write_summary_checkout.py >> $GITHUB_STEP_SUMMARY 2>/dev/null || true

  # ─────────────────────────────────────────────────────────────
  # JOB 7: Тесты товаров (10 баллов, бонус)
  # ─────────────────────────────────────────────────────────────
  test-inventory:
    name: "📦 Inventory (10 бонус)"
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    needs: check-structure
    continue-on-error: true
    outputs:
