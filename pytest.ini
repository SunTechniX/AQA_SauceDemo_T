# pytest.ini (в корне репозитория!)
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --timeout=120
timeout = 120
markers =
    auth: Тесты авторизации
    cart: Тесты корзины
    checkout: Тесты оформления
    e2e: End-to-End тесты
    smoke: Дымовые тесты