# tools/flake8_config.cfg
# Конфигурация flake8 для студенческих проектов
# Показываем ВСЕ ошибки для обучения

[flake8]
# Максимальная длина строки
max-line-length = 120

# Игнорируемые правила (минимально, чтобы студенты учились)
ignore = E203,W503

# Исключённые папки
exclude = 
    .git,
    __pycache__,
    build,
    dist,
    .eggs,
    *.egg-info,
    .venv,
    venv,
    output/,
    tools/output/

# Показывать исходный код ошибки
show-source = true

# Показывать статистику
statistics = true

# Считать количество ошибок
count = true

# Формат вывода
format = %(path)s:%(row)d:%(col)d: %(code)s %(text)s