# tools/flake8_config.cfg

[flake8]
max-line-length = 120
ignore = E203,W503

# ✅ Исключаем только служебные папки, не student_template/
exclude = 
    .git,
    __pycache__,
    build,
    dist,
    .eggs,
    *.egg-info,
    .venv,
    venv,
    output/,
    tools/output/,
    .github/

show-source = true
statistics = true
count = true
format = %(path)s:%(row)d:%(col)d: %(code)s %(text)s